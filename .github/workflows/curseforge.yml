name: CurseForge Update Checker (NO API)

permissions:
  contents: write

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔎 Get latest version from public page
      - name: Fetch CurseForge page
        id: cf
        run: |
          URL="https://www.curseforge.com/minecraft/modpacks/apocalyptic-survival-server/files"

          HTML=$(curl -s "$URL")

          echo "$HTML" > page.html

          # 🔥 extraction simple (latest file ID)
          FILE_ID=$(echo "$HTML" | grep -oE "/files/[0-9]+" | head -n 1 | grep -oE "[0-9]+")

          if [ -z "$FILE_ID" ]; then
            echo "❌ Impossible de trouver version"
            exit 1
          fi

          VERSION_NAME=$(echo "$HTML" | grep -oP '(?<=data-name=")[^"]+' | head -n 1)

          FILE_URL="https://www.curseforge.com/minecraft/modpacks/apocalyptic-survival-server/files/$FILE_ID"

          echo "latest_id=$FILE_ID" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "url=$FILE_URL" >> $GITHUB_OUTPUT

      # 📂 Read last version
      - name: Read previous version
        id: old
        run: |
          if [ -s last_version.txt ]; then
            OLD_ID=$(cat last_version.txt)
          else
            OLD_ID=0
          fi

          echo "old_id=$OLD_ID" >> $GITHUB_OUTPUT

      # 🔍 Compare
      - name: Compare versions
        id: check
        run: |
          if [ "${{ steps.cf.outputs.latest_id }}" != "${{ steps.old.outputs.old_id }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      # 🔔 Discord
      - name: Send Discord message
        if: steps.check.outputs.update == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"🚀 **Nouvelle version du modpack !**\\n📦 Version ID : ${{ steps.cf.outputs.latest_id }}\\n📌 ${{ steps.cf.outputs.url }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # 💾 Save version
      - name: Save version
        if: steps.check.outputs.update == 'true'
        run: |
          echo "${{ steps.cf.outputs.latest_id }}" > last_version.txt

      # 📤 Commit
      - name: Commit update
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add last_version.txt
          git commit -m "Update version"
          git push
