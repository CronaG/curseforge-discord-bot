name: CurseForge Auto Update Checker

permissions:
  contents: write

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔎 STEP 1 - AUTO FIND MODPACK ID
      - name: Find Modpack ID automatically
        id: search
        run: |
          SEARCH=$(curl -s \
            -H "x-api-key: ${{ secrets.CURSEFORGE_API_KEY }}" \
            "https://api.curseforge.com/v1/mods/search?gameId=432&searchFilter=apocalyptic survival server")

          echo "$SEARCH" > search.json

          echo "==== SEARCH RESULT ===="
          cat search.json

          MOD_ID=$(jq -r '.data[0].id // empty' search.json)
          MOD_NAME=$(jq -r '.data[0].name // "unknown-modpack"' search.json)

          if [ -z "$MOD_ID" ]; then
            echo "❌ ERROR: Modpack introuvable via search API"
            exit 1
          fi

          echo "mod_id=$MOD_ID" >> $GITHUB_OUTPUT
          echo "mod_name=$MOD_NAME" >> $GITHUB_OUTPUT

      # 📦 STEP 2 - GET LATEST FILES
      - name: Get latest version
        id: cf
        run: |
          MOD_ID=${{ steps.search.outputs.mod_id }}

          RESPONSE=$(curl -s \
            -H "x-api-key: ${{ secrets.CURSEFORGE_API_KEY }}" \
            "https://api.curseforge.com/v1/mods/$MOD_ID/files?pageSize=1")

          echo "$RESPONSE" > data.json

          echo "==== FILES RESPONSE ===="
          cat data.json

          if ! jq empty data.json 2>/dev/null; then
            echo "❌ JSON invalide"
            exit 1
          fi

          COUNT=$(jq '.data | length' data.json)

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ Aucun fichier trouvé"
            exit 1
          fi

          LATEST_ID=$(jq -r '.data[0].id' data.json)
          VERSION_NAME=$(jq -r '.data[0].displayName // "unknown-version"' data.json)
          FILE_NAME=$(jq -r '.data[0].fileName // "unknown-file"' data.json)

          URL="https://www.curseforge.com/minecraft/modpacks/apocalyptic-survival-server/files/$LATEST_ID"

          echo "latest_id=$LATEST_ID" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      # 📂 OLD VERSION
      - name: Read previous version
        id: old
        run: |
          if [ -s last_version.txt ]; then
            OLD_ID=$(cat last_version.txt)
          else
            OLD_ID=0
          fi
          echo "old_id=$OLD_ID" >> $GITHUB_OUTPUT

      # 🧠 DEBUG
      - name: Debug
        run: |
          echo "Mod ID: ${{ steps.search.outputs.mod_id }}"
          echo "Latest: ${{ steps.cf.outputs.latest_id }}"
          echo "Old: ${{ steps.old.outputs.old_id }}"

      # 🔍 COMPARE
      - name: Compare versions
        id: check
        run: |
          if [ "${{ steps.cf.outputs.latest_id }}" != "${{ steps.old.outputs.old_id }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      # 🔔 DISCORD
      - name: Send Discord message
        if: steps.check.outputs.update == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"@everyone\\n🚀 **Nouvelle version du modpack !**\\n📦 ${{ steps.cf.outputs.version_name }}\\n📁 ${{ steps.cf.outputs.file_name }}\\n🔗 ${{ steps.cf.outputs.url }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # 💾 SAVE VERSION
      - name: Save version
        if: steps.check.outputs.update == 'true'
        run: |
          echo "${{ steps.cf.outputs.latest_id }}" > last_version.txt

      # 📤 COMMIT
      - name: Commit update
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add last_version.txt
          git commit -m "Update version" || echo "No changes"
          git push