name: CurseForge Update Checker (NO API)

permissions:
  contents: write

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔎 Get latest file ID
      - name: Get latest file ID
        id: cf
        run: |
          set -e

          BASE_URL="https://www.curseforge.com/minecraft/modpacks/apocalyptic-survival-server/files"

          HTML=$(curl -sL "$BASE_URL")

          FILE_ID=$(echo "$HTML" | grep -oE '/files/[0-9]+' | head -n 1 | grep -oE '[0-9]+')

          if [ -z "$FILE_ID" ]; then
            echo "❌ ERROR: FILE_ID introuvable"
            exit 1
          fi

          echo "latest_id=$FILE_ID" >> $GITHUB_OUTPUT

      # 🔎 Get version name
      - name: Get version name
        id: version
        run: |
          FILE_ID=${{ steps.cf.outputs.latest_id }}

          FILE_PAGE="https://www.curseforge.com/minecraft/modpacks/apocalyptic-survival-server/files/$FILE_ID"

          FILE_HTML=$(curl -sL "$FILE_PAGE")

          # 🔥 Récupération du titre
          VERSION_NAME=$(echo "$FILE_HTML" | grep -oE '<title>[^<]+' | head -n 1 | sed 's/<title>//')

          # 🔥 Nettoyage CurseForge
          VERSION_NAME=$(echo "$VERSION_NAME" | sed 's/ - Minecraft Modpacks - CurseForge//')

          # 🔥 BONUS → supprime le nom du modpack
          VERSION_NAME=$(echo "$VERSION_NAME" | sed 's/Apocalyptic Survival Server - //')

          # fallback
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="version-$FILE_ID"
          fi

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "url=$FILE_PAGE" >> $GITHUB_OUTPUT

      # 📂 Read previous version
      - name: Read previous version
        id: old
        run: |
          if [ -s last_version.txt ]; then
            OLD_ID=$(cat last_version.txt)
          else
            OLD_ID=0
          fi

          echo "old_id=$OLD_ID" >> $GITHUB_OUTPUT

      # 🔍 Compare versions
      - name: Compare versions
        id: check
        run: |
          if [ "${{ steps.cf.outputs.latest_id }}" != "${{ steps.old.outputs.old_id }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      # 🔔 Discord
      - name: Send Discord message
        if: steps.check.outputs.update == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"@everyone\\n🚀 **Nouvelle version du modpack !**\\n📦 Version : ${{ steps.version.outputs.version_name }}\\n🔗 ${{ steps.version.outputs.url }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # 💾 Save version
      - name: Save version
        if: steps.check.outputs.update == 'true'
        run: |
          echo "${{ steps.cf.outputs.latest_id }}" > last_version.txt

      # 📤 Commit
      - name: Commit update
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add last_version.txt
          git commit -m "Update modpack version" || echo "No changes"
          git push
