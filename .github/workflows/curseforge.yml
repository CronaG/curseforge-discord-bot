name: CurseForge Update Checker

permissions:
  contents: write
  
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔍 CurseForge API
      - name: Get latest CurseForge file
        id: cf
        run: |
          RESPONSE=$(curl -s \
            -H "x-api-key: ${{ secrets.CURSEFORGE_API_KEY }}" \
            "https://api.curseforge.com/v1/mods/911562/files?pageSize=1")

          echo "$RESPONSE" > data.json

          echo "==== RAW API RESPONSE ===="
          cat data.json

          # 🔥 Vérifie JSON valide
          if ! jq empty data.json 2>/dev/null; then
            echo "❌ ERROR: JSON invalide"
            exit 1
          fi

          # 🔥 Vérifie présence data
          if [ "$(jq 'has("data")' data.json)" != "true" ]; then
            echo "❌ ERROR: API CurseForge invalide ou modId incorrect"
            cat data.json
            exit 1
          fi

          # 🔥 Vérifie contenu
          COUNT=$(jq '.data | length' data.json)

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ ERROR: Aucun fichier trouvé"
            exit 1
          fi

          # 📦 Extraction sécurisée
          LATEST_ID=$(jq -r '.data[0].id // empty' data.json)
          VERSION_NAME=$(jq -r '.data[0].displayName // "unknown-version"' data.json)
          FILE_NAME=$(jq -r '.data[0].fileName // "unknown-file"' data.json)

          # 🔥 sécurité ultime
          if [ -z "$LATEST_ID" ] || [ "$LATEST_ID" = "null" ]; then
            echo "❌ ERROR: latest_id vide"
            cat data.json
            exit 1
          fi

          # 🔗 lien propre CurseForge
          URL="https://www.curseforge.com/minecraft/modpacks/apocalyptic-survival-server/files/$LATEST_ID"

          echo "latest_id=$LATEST_ID" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      # 📂 Version précédente
      - name: Read previous version
        id: old
        run: |
          if [ -s last_version.txt ]; then
            OLD_ID=$(cat last_version.txt)
          else
            OLD_ID=0
          fi
          echo "old_id=$OLD_ID" >> $GITHUB_OUTPUT

      # 🧠 Debug
      - name: Debug values
        run: |
          echo "Latest ID: ${{ steps.cf.outputs.latest_id }}"
          echo "Old ID: ${{ steps.old.outputs.old_id }}"
          echo "Version: ${{ steps.cf.outputs.version_name }}"
          echo "File: ${{ steps.cf.outputs.file_name }}"
          echo "URL: ${{ steps.cf.outputs.url }}"

      # 🔍 Compare versions
      - name: Compare versions
        id: check
        run: |
          if [ "${{ steps.cf.outputs.latest_id }}" != "${{ steps.old.outputs.old_id }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      # 🔔 Discord message
      - name: Send Discord message
        if: steps.check.outputs.update == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"@everyone\\n🚀 **Nouvelle version du modpack !**\\n📦 Version : ${{ steps.cf.outputs.version_name }}\\n📁 Fichier : ${{ steps.cf.outputs.file_name }}\\n🔗 ${{ steps.cf.outputs.url }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # 💾 Save version
      - name: Save new version
        if: steps.check.outputs.update == 'true'
        run: |
          echo "${{ steps.cf.outputs.latest_id }}" > last_version.txt

      # 📤 Commit update
      - name: Commit update
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add last_version.txt
          git commit -m "Update version" || echo "No changes"
          git push