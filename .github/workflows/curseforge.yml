name: CurseForge Update Checker (NO API)

permissions:
  contents: write

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔎 Fetch CurseForge page
      - name: Get latest modpack version
        id: cf
        run: |
          set -e

          URL="https://www.curseforge.com/minecraft/modpacks/apocalyptic-survival-server/files"

          HTML=$(curl -sL "$URL")

          echo "$HTML" > page.html

          # 🔥 Extract latest file ID (stable pattern)
          FILE_ID=$(echo "$HTML" | grep -oE '/files/[0-9]+' | head -n 1 | grep -oE '[0-9]+')

          if [ -z "$FILE_ID" ]; then
            echo "❌ ERROR: FILE_ID introuvable"
            exit 1
          fi

          # 🔥 VERSION NAME FIX (multi fallback)
          VERSION_NAME=$(echo "$HTML" | grep -oE '"fileName":"[^"]+"' | head -n 1 | cut -d'"' -f4)

          # fallback 1
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(echo "$HTML" | grep -oE 'data-name="[^"]+"' | head -n 1 | cut -d'"' -f2)
          fi

          # fallback 2 (title page)
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(echo "$HTML" | grep -oE '<h1[^>]*>[^<]+' | head -n 1 | sed 's/<[^>]*>//g')
          fi

          # fallback final
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="version-$FILE_ID"
          fi

          FILE_URL="https://www.curseforge.com/minecraft/modpacks/apocalyptic-survival-server/files/$FILE_ID"

          echo "latest_id=$FILE_ID" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "url=$FILE_URL" >> $GITHUB_OUTPUT

      # 📂 Read previous version
      - name: Read previous version
        id: old
        run: |
          if [ -s last_version.txt ]; then
            OLD_ID=$(cat last_version.txt)
          else
            OLD_ID=0
          fi

          echo "old_id=$OLD_ID" >> $GITHUB_OUTPUT

      # 🧠 Debug
      - name: Debug values
        run: |
          echo "Latest ID: ${{ steps.cf.outputs.latest_id }}"
          echo "Old ID: ${{ steps.old.outputs.old_id }}"
          echo "Version: ${{ steps.cf.outputs.version_name }}"

      # 🔍 Compare versions
      - name: Compare versions
        id: check
        run: |
          if [ "${{ steps.cf.outputs.latest_id }}" != "${{ steps.old.outputs.old_id }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      # 🔔 Discord message
      - name: Send Discord message
        if: steps.check.outputs.update == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"🚀 **Nouvelle version du modpack !**\\n📦 Version : ${{ steps.cf.outputs.version_name }}\\n📁 ID : ${{ steps.cf.outputs.latest_id }}\\n🔗 ${{ steps.cf.outputs.url }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # 💾 Save version
      - name: Save version
        if: steps.check.outputs.update == 'true'
        run: |
          echo "${{ steps.cf.outputs.latest_id }}" > last_version.txt

      # 📤 Commit update
      - name: Commit update
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add last_version.txt
          git commit -m "Update modpack version" || echo "No changes"
          git push
